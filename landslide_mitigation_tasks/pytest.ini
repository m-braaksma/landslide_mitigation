[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = testing

# Minimum version
minversion = 6.0

# Add current directory to Python path
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may need data)
    slow: Slow tests (may take >1 second)
    requires_data: Tests that require actual data files

# Coverage options (if using pytest-cov)
# Uncomment if you install pytest-cov: pip install pytest-cov
# addopts = --cov=landslide_mitigation_tasks --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
